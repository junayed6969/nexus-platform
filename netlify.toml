[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["netlify/functions/**"]

# ─── API Redirects ────────────────────────────────────────────────────────────
[[redirects]]
  from = "/api/click"
  to   = "/.netlify/functions/click"
  status = 200

[[redirects]]
  from = "/api/postback"
  to   = "/.netlify/functions/postback"
  status = 200

[[redirects]]
  from = "/api/stats"
  to   = "/.netlify/functions/stats"
  status = 200

[[redirects]]
  from = "/api/links"
  to   = "/.netlify/functions/links"
  status = 200

[[redirects]]
  from = "/api/clicks"
  to   = "/.netlify/functions/clicks"
  status = 200

[[redirects]]
  from = "/api/conversions"
  to   = "/.netlify/functions/conversions"
  status = 200

# ─── Short Link Redirect ──────────────────────────────────────────────────────
[[redirects]]
  from = "/l/:slug"
  to   = "/.netlify/functions/short?slug=:slug"
  status = 200

# ─── SPA Fallback ─────────────────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to   = "/dashboard.html"
  status = 200

[dev]
  functions = "netlify/functions"
  publish   = "public"
  port      = 8888
